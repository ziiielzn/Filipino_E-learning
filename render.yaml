services:
  - type: web
    name: e-wikom
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: e-wikom-db
          property: connectionString
      - key: NODE_VERSION
        value: 18.17.0

databases:
  - name: e-wikom-db
    plan: free
